body:
  text: 序心印眼藏微妙大法幾千百載愈見闊盛始自文佛傳至達磨師師授受迄今象大師已七十代矣豈等閒哉師法紹芙蓉錫駐白雲一切上堂小參拈頌機緣言言越聖句句超凡單單鉗錘本分一味痛快指南誠人天慧鑑學者依端海內禪眾欲觀此錄須得出回白汗方能體旨窮玄立身如未周正抬頭天地相懸更將情識量測則無有是處焉順治己亥歲佛歡喜日弟子妙心沐浴焚香稽首撰
